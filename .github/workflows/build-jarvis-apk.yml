name: Build Jarvis App APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/replit-main-continuation
    paths:
      - '.github/workflows/build-jarvis-apk.yml'
      - 'app/**'
      - 'assets/**'
      - 'components/**'
      - 'lib/**'
      - 'scripts/patch_gradle.py'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      JARVIS_PUBLIC_DOMAIN: ${{ vars.JARVIS_PUBLIC_DOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          mkdir -p "$SDK/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "$SDK/licenses/android-sdk-preview-license"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Validate public Jarvis domain
        run: |
          if [ -z "$JARVIS_PUBLIC_DOMAIN" ]; then
            echo "Set repository variable JARVIS_PUBLIC_DOMAIN to the hosted Jarvis OS API domain before building the APK." >&2
            exit 1
          fi

      - name: Run Expo prebuild
        env:
          EXPO_PUBLIC_DOMAIN: ${{ env.JARVIS_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 464052645678-au43qstbkio1gc6foomqo1a40c9f5vpk.apps.googleusercontent.com
        run: npx expo prebuild --platform android --clean

      # Cache the Gradle wrapper distribution so Gradle 8.14.3 is only
      # downloaded once and reused on subsequent runs.
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-wrapper-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      # Cache Gradle build caches to speed up incremental compilation.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-caches-

      # Decode the app signing keystore from GitHub Secrets. Same key means Android accepts updates without uninstall.
      - name: Setup signing keystore
        env:
          JARVIS_APP_KEYSTORE_BASE64: ${{ secrets.JARVIS_APP_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.JARVIS_APP_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JARVIS_APP_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JARVIS_APP_KEY_PASSWORD }}
        run: |
          if [ -z "$JARVIS_APP_KEYSTORE_BASE64" ]; then
            echo "JARVIS_APP_KEYSTORE_BASE64 GitHub Secret is required" >&2
            exit 1
          fi
          printf '%s' "$JARVIS_APP_KEYSTORE_BASE64" | base64 --decode > jarvis-app.keystore
          test -s jarvis-app.keystore

      - name: Inject signing config and versionCode into build.gradle
        env:
          KEYSTORE_ABS: ${{ github.workspace }}/jarvis-app.keystore
          KEYSTORE_PASSWORD: ${{ secrets.JARVIS_APP_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JARVIS_APP_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JARVIS_APP_KEY_PASSWORD }}
          GRADLE_FILE: android/app/build.gradle
          RUN_NUMBER: ${{ github.run_number }}
        run: python3 scripts/patch_gradle.py

      - name: Verify build.gradle patching
        run: |
          echo "--- Checking signingConfigs.release ---"
          grep -n 'signingConfigs' android/app/build.gradle || (echo "ERROR: signingConfigs missing" && exit 1)
          grep -n 'storeFile' android/app/build.gradle || (echo "ERROR: storeFile missing" && exit 1)
          echo "--- Checking buildTypes.release signingConfig ---"
          grep -n 'signingConfig signingConfigs.release' android/app/build.gradle || (echo "ERROR: signingConfig not wired to release buildType" && exit 1)
          echo "--- Checking versionCode ---"
          grep -n 'versionCode' android/app/build.gradle
          echo "Verification passed"

      - name: Build release APK
        working-directory: android
        env:
          EXPO_PUBLIC_DOMAIN: ${{ env.JARVIS_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 464052645678-au43qstbkio1gc6foomqo1a40c9f5vpk.apps.googleusercontent.com
          KEYSTORE_PASSWORD: ${{ secrets.JARVIS_APP_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JARVIS_APP_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JARVIS_APP_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate, rename APK and write version.json
        run: |
          mkdir -p dist
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-app.apk
          SHA256=$(sha256sum dist/jarvis-app.apk | awk '{print $1}')
          echo "APK ready: $(ls -lh dist/jarvis-app.apk)"
          cat > dist/version.json <<JSON
          {
            "platform": "android",
            "versionCode": ${{ github.run_number }},
            "versionName": "1.0.${{ github.run_number }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/jarvis-app-latest/jarvis-app.apk",
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/tag/jarvis-app-latest",
            "sha256": "$SHA256",
            "notes": "Jarvis App build ${{ github.run_number }}"
          }
          JSON
          echo "version.json: $(cat dist/version.json)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-app-apk
          path: |
            dist/jarvis-app.apk
            dist/version.json
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jarvis-app-latest
          name: "Jarvis App v1.0.${{ github.run_number }}"
          body: |
            Pre-built APK for the Jarvis OS mobile app - build ${{ github.run_number }}.

            Connects to the configured Jarvis OS server at **${{ env.JARVIS_PUBLIC_DOMAIN }}**. No Expo Go required.

            **First-time install:**
            1. Download `jarvis-app.apk` to your Android phone
            2. Enable *Settings > Apps > Special app access > Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the app and sign in

            **Updating:** Download the new APK and install it. Android will update in place without an uninstall because every build is signed with the same key.
          files: |
            dist/jarvis-app.apk
            dist/version.json
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
