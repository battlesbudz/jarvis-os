name: Build Jarvis App APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          mkdir -p "$SDK/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "$SDK/licenses/android-sdk-preview-license"

      # Install Gradle 8.4 directly — avoids two problems:
      # (1) setup-gradle@v4 action times out fetching version metadata
      # (2) system Gradle 9.4.1 is incompatible with this project's AGP version
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run Expo prebuild
        env:
          EXPO_PUBLIC_DOMAIN: GameplanAI.replit.app
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 464052645678-au43qstbkio1gc6foomqo1a40c9f5vpk.apps.googleusercontent.com
        run: npx expo prebuild --platform android --clean

      # Generate the keystore ONCE on the first run and commit it back.
      # Every subsequent run finds it in the repo and skips generation.
      # Same key → same signature → Android accepts updates without uninstall.
      - name: Setup signing keystore
        run: |
          if [ -f jarvis-app.keystore ]; then
            echo "Keystore already exists — using committed version"
          else
            echo "No keystore found — generating and committing for the first time"
            keytool -genkey -v \
              -keystore jarvis-app.keystore \
              -alias your-jarvis-app-key-alias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -storepass your-android-signing-password \
              -keypass your-android-signing-password \
              -dname "CN=Jarvis App,O=Jarvis,C=US"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add jarvis-app.keystore
            git commit -m "chore: add signing keystore for Jarvis app APK updates [skip ci]"
            git push
            echo "Keystore committed — all future builds will use this same key"
          fi

      - name: Inject signing config and versionCode into build.gradle
        run: |
          python3 - <<'PYEOF'
import re, os

keystore_path = os.environ['KEYSTORE_ABS']
run_number = int(os.environ['RUN_NUMBER'])
gradle_file = os.environ['GRADLE_FILE']

with open(gradle_file, 'r') as f:
    lines = f.readlines()

def find_closing_brace(lines, start_idx):
    """Return the index of the line that closes the block opened at start_idx."""
    depth = 0
    for i in range(start_idx, len(lines)):
        depth += lines[i].count('{') - lines[i].count('}')
        if depth <= 0:
            return i
    return len(lines) - 1

# 1. Replace versionCode
for i, line in enumerate(lines):
    if 'versionCode' in line and '//' not in line:
        lines[i] = re.sub(r'versionCode \d+', f'versionCode {run_number}', line)
        print(f"  versionCode updated on line {i+1}")
        break

# 2. Ensure signingConfigs.release exists
signing_configs_start = None
for i, line in enumerate(lines):
    if re.search(r'\bsigningConfigs\s*\{', line):
        signing_configs_start = i
        break

if signing_configs_start is not None:
    signing_configs_end = find_closing_brace(lines, signing_configs_start)
    block_text = ''.join(lines[signing_configs_start:signing_configs_end + 1])
    if 'release' not in block_text:
        # Insert release entry before the closing brace of signingConfigs
        release_lines = [
            '        release {\n',
            f'            storeFile file("{keystore_path}")\n',
            '            storePassword "your-android-signing-password"\n',
            '            keyAlias "your-jarvis-app-key-alias"\n',
            '            keyPassword "your-android-signing-password"\n',
            '        }\n',
        ]
        lines[signing_configs_end:signing_configs_end] = release_lines
        print("  Inserted signingConfigs.release block")
    else:
        print("  signingConfigs.release already present — skipping insert")
else:
    # No signingConfigs at all — add one before buildTypes
    build_types_idx = next(
        (i for i, l in enumerate(lines) if re.search(r'\bbuildTypes\s*\{', l)), None
    )
    insert_at = build_types_idx if build_types_idx is not None else len(lines)
    signing_block = [
        '    signingConfigs {\n',
        '        release {\n',
        f'            storeFile file("{keystore_path}")\n',
        '            storePassword "your-android-signing-password"\n',
        '            keyAlias "your-jarvis-app-key-alias"\n',
        '            keyPassword "your-android-signing-password"\n',
        '        }\n',
        '    }\n',
    ]
    lines[insert_at:insert_at] = signing_block
    print("  Created signingConfigs block with release entry")

# 3. Wire signingConfig into buildTypes.release (not into signingConfigs.release)
#    Find buildTypes { first, then look for release { inside it.
build_types_start = next(
    (i for i, l in enumerate(lines) if re.search(r'\bbuildTypes\s*\{', l)), None
)
if build_types_start is not None:
    build_types_end = find_closing_brace(lines, build_types_start)
    release_start = None
    for i in range(build_types_start + 1, build_types_end + 1):
        if re.search(r'\brelease\s*\{', lines[i]):
            release_start = i
            break
    if release_start is not None:
        release_end = find_closing_brace(lines, release_start)
        block_text = ''.join(lines[release_start:release_end + 1])
        if 'signingConfig signingConfigs.release' not in block_text:
            # Insert immediately after the opening brace line
            indent = '            '
            lines.insert(release_start + 1, f'{indent}signingConfig signingConfigs.release\n')
            print("  Injected signingConfig into buildTypes.release")
        else:
            print("  signingConfig already present in buildTypes.release — skipping")
    else:
        print("WARNING: buildTypes.release block not found")
else:
    print("WARNING: buildTypes block not found")

with open(gradle_file, 'w') as f:
    f.writelines(lines)

print("build.gradle patched successfully")
PYEOF
        env:
          KEYSTORE_ABS: ${{ github.workspace }}/jarvis-app.keystore
          GRADLE_FILE: android/app/build.gradle
          RUN_NUMBER: ${{ github.run_number }}

      - name: Verify build.gradle patching
        run: |
          echo "--- Checking signingConfigs.release ---"
          grep -n 'signingConfigs' android/app/build.gradle || (echo "ERROR: signingConfigs missing" && exit 1)
          grep -n 'storeFile' android/app/build.gradle || (echo "ERROR: storeFile missing" && exit 1)
          echo "--- Checking buildTypes.release signingConfig ---"
          grep -n 'signingConfig signingConfigs.release' android/app/build.gradle || (echo "ERROR: signingConfig not wired to release buildType" && exit 1)
          echo "--- Checking versionCode ---"
          grep -n 'versionCode' android/app/build.gradle
          echo "Verification passed"

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Locate, rename APK and write version.json
        run: |
          mkdir -p dist
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-app.apk
          echo "APK ready: $(ls -lh dist/jarvis-app.apk)"
          printf '{"versionCode":%d,"versionName":"1.0.%d"}' \
            ${{ github.run_number }} ${{ github.run_number }} > dist/version.json
          echo "version.json: $(cat dist/version.json)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-app-apk
          path: |
            dist/jarvis-app.apk
            dist/version.json
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jarvis-app-latest
          name: "Jarvis App v1.0.${{ github.run_number }}"
          body: |
            Pre-built APK for the Jarvis main app — build ${{ github.run_number }}.

            Connects to the production server at **GameplanAI.replit.app** — no Expo Go required.

            **First-time install:**
            1. Download `jarvis-app.apk` to your Android phone
            2. Enable *Settings → Apps → Special app access → Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the app and sign in

            **Updating:** Download the new APK and install it — Android will update in place without an uninstall because every build is signed with the same key.
          files: |
            dist/jarvis-app.apk
            dist/version.json
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
