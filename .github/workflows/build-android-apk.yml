name: Build Android Daemon APK

on:
  push:
    branches: [main]
    paths:
      - 'android-daemon/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          mkdir -p "$SDK/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "$SDK/licenses/android-sdk-preview-license"

      # Install Gradle 8.4 directly — avoids two problems:
      # (1) setup-gradle@v4 action times out fetching version metadata
      # (2) system Gradle 9.4.1 is incompatible with this project's AGP version
      # (3) gradlew wrapper script has a shell quoting bug on Linux CI runners
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      # Decode the daemon signing keystore from GitHub Secrets. Same key means Android accepts updates without uninstall.
      - name: Setup signing keystore
        env:
          ANDROID_DAEMON_KEYSTORE_BASE64: ${{ secrets.ANDROID_DAEMON_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DAEMON_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_DAEMON_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_DAEMON_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_DAEMON_KEYSTORE_BASE64" ]; then
            echo "ANDROID_DAEMON_KEYSTORE_BASE64 GitHub Secret is required" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_DAEMON_KEYSTORE_BASE64" | base64 --decode > android-daemon/jarvis-daemon.keystore
          test -s android-daemon/jarvis-daemon.keystore

      - name: Build release APK
        working-directory: android-daemon
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
          KEYSTORE_PATH: ${{ github.workspace }}/android-daemon/jarvis-daemon.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DAEMON_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_DAEMON_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_DAEMON_KEY_PASSWORD }}
        run: gradle assembleDebug --no-daemon

      - name: Locate, rename APK and write version.json
        run: |
          mkdir -p dist
          APK=$(find android-daemon/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-daemon.apk
          echo "APK ready: $(ls -lh dist/jarvis-daemon.apk)"
          printf '{"versionCode":%d,"versionName":"1.0.%d"}' \
            ${{ github.run_number }} ${{ github.run_number }} > dist/version.json
          echo "version.json: $(cat dist/version.json)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-daemon-apk
          path: |
            dist/jarvis-daemon.apk
            dist/version.json
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-daemon-latest
          name: "Jarvis Android Daemon v1.0.${{ github.run_number }}"
          body: |
            Pre-built APK for the Jarvis Android Daemon — build ${{ github.run_number }}.

            **Install instructions (first time only):**
            1. Download `jarvis-daemon.apk` to your Android phone
            2. Enable *Settings → Apps → Special app access → Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the Jarvis app → Profile → Connected Channels → Android Device → Pair
            5. Enter your Jarvis server URL and the pairing code shown in the app

            **Updating:** Open the Jarvis Daemon app — it detects new versions automatically and offers a one-tap update. No uninstall needed.
          files: |
            dist/jarvis-daemon.apk
            dist/version.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
