name: Build Android Daemon APK

on:
  push:
    branches: [main]
    paths:
      - 'android-daemon/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          mkdir -p "$SDK/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "$SDK/licenses/android-sdk-preview-license"

      # Generate the keystore ONCE on the first run and commit it back.
      # Every subsequent run finds it in the repo and skips generation.
      # Same key → same signature → Android accepts updates without uninstall.
      - name: Setup signing keystore
        run: |
          if [ -f android-daemon/jarvis-daemon.keystore ]; then
            echo "Keystore already exists — using committed version"
          else
            echo "No keystore found — generating and committing for the first time"
            keytool -genkey -v \
              -keystore android-daemon/jarvis-daemon.keystore \
              -alias jarviskey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -storepass jarvis2024 \
              -keypass jarvis2024 \
              -dname "CN=Jarvis Daemon,O=Jarvis,C=US"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add android-daemon/jarvis-daemon.keystore
            git commit -m "chore: add signing keystore for consistent APK updates [skip ci]"
            git push
            echo "Keystore committed — all future builds will use this same key"
          fi

      - name: Build release APK
        working-directory: android-daemon
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
          KEYSTORE_PATH: ${{ github.workspace }}/android-daemon/jarvis-daemon.keystore
          KEYSTORE_PASSWORD: jarvis2024
          KEY_ALIAS: jarviskey
          KEY_PASSWORD: jarvis2024
        run: gradle assembleRelease --no-daemon

      - name: Locate, rename APK and write version.json
        run: |
          mkdir -p dist
          APK=$(find android-daemon/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-daemon.apk
          echo "APK ready: $(ls -lh dist/jarvis-daemon.apk)"
          printf '{"versionCode":%d,"versionName":"1.0.%d"}' \
            ${{ github.run_number }} ${{ github.run_number }} > dist/version.json
          echo "version.json: $(cat dist/version.json)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-daemon-apk
          path: |
            dist/jarvis-daemon.apk
            dist/version.json
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-daemon-latest
          name: "Jarvis Android Daemon v1.0.${{ github.run_number }}"
          body: |
            Pre-built APK for the Jarvis Android Daemon — build ${{ github.run_number }}.

            **Install instructions (first time only):**
            1. Download `jarvis-daemon.apk` to your Android phone
            2. Enable *Settings → Apps → Special app access → Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the Jarvis app → Profile → Connected Channels → Android Device → Pair
            5. Enter your Jarvis server URL and the pairing code shown in the app

            **Updating:** Open the Jarvis Daemon app — it detects new versions automatically and offers a one-tap update. No uninstall needed.
          files: |
            dist/jarvis-daemon.apk
            dist/version.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
