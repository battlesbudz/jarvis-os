name: Build Android Daemon APK

on:
  push:
    branches: [main]
    paths:
      - 'android-daemon/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x android-daemon/gradlew

      - name: Build debug APK
        working-directory: android-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate and rename APK
        run: |
          mkdir -p dist
          APK=$(find android-daemon/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-daemon.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-daemon-apk
          path: dist/jarvis-daemon.apk
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-daemon-latest
          name: Jarvis Android Daemon (latest)
          body: |
            Pre-built APK for the Jarvis Android Daemon.

            **Install instructions:**
            1. Download `jarvis-daemon.apk` to your Android phone
            2. Enable *Settings → Apps → Special app access → Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the Jarvis app → Profile → Connected Channels → Android Device → Pair
            5. Enter your Jarvis server URL and the pairing code shown in the app
          files: dist/jarvis-daemon.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
