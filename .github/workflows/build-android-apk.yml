name: Build Android Daemon APK

on:
  push:
    branches: [main]
    paths:
      - 'android-daemon/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          mkdir -p "$SDK/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "$SDK/licenses/android-sdk-preview-license"

      - name: Generate correct Gradle wrapper jar
        run: |
          echo "Downloading Gradle 8.4 distribution..."
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist
          echo "Extracting gradle-wrapper.jar directly from distribution (no Maven needed)..."
          WRAPPER_JAR=$(find /tmp/gradle-dist/gradle-8.4 -name "gradle-wrapper.jar" 2>/dev/null | head -1)
          if [ -n "$WRAPPER_JAR" ]; then
            mkdir -p android-daemon/gradle/wrapper
            cp "$WRAPPER_JAR" android-daemon/gradle/wrapper/gradle-wrapper.jar
            echo "Wrapper jar ready: $(ls -lh android-daemon/gradle/wrapper/gradle-wrapper.jar)"
          else
            echo "gradle-wrapper.jar not found in distribution zip. Contents:"
            find /tmp/gradle-dist/gradle-8.4 -name "*.jar" | head -20
            exit 1
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x android-daemon/gradlew

      - name: Build debug APK
        working-directory: android-daemon
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate and rename APK
        run: |
          mkdir -p dist
          APK=$(find android-daemon/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found after build" && exit 1
          fi
          cp "$APK" dist/jarvis-daemon.apk
          echo "APK ready: $(ls -lh dist/jarvis-daemon.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-daemon-apk
          path: dist/jarvis-daemon.apk
          retention-days: 90

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-daemon-latest
          name: Jarvis Android Daemon (latest)
          body: |
            Pre-built APK for the Jarvis Android Daemon.

            **Install instructions:**
            1. Download `jarvis-daemon.apk` to your Android phone
            2. Enable *Settings → Apps → Special app access → Install unknown apps* for your file manager or browser
            3. Tap the downloaded file and install
            4. Open the Jarvis app → Profile → Connected Channels → Android Device → Pair
            5. Enter your Jarvis server URL and the pairing code shown in the app
          files: dist/jarvis-daemon.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
